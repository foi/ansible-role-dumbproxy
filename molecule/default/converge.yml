# code: language=ansible
# vim: set filetype=yaml.ansible :
---
- name: Converge
  hosts: all
  tasks:

    - name: set dumbproxy args
      ansible.builtin.set_fact:
        dumbproxy_args:
          - -bind-address 127.0.0.1:443
          - -deny-dst-addr 127.0.0.0/8
          - -autocert

    - name: "include dumbproxy role"
      ansible.builtin.include_role:
        name: "{{ lookup('env', 'GITHUB_WORKSPACE') }}"
