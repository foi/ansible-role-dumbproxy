# code: language=ansible
# vim: set filetype=yaml.ansible :
---
- name: "create dumbproxy system user"
  ansible.builtin.user:
    name: "{{ dumbproxy_user }}"
    system: true
    shell: "/usr/sbin/nologin"
    createhome: false

- name: "append dumbproxy user to groups"
  when:
    - dumbproxy_append_to_groups | length > 0
  ansible.builtin.user:
    name: "{{ dumbproxy_user }}"
    append: true
    groups: "{{ dumbproxy_append_to_groups }}"
  notify:
    - "restart dumbproxy"

- name: "create etc path"
  ansible.builtin.file:
    path: "{{ dumbproxy_etc_path }}"
    mode: "{{ dumbproxy_etc_path_mode }}"
    state: directory

- name: "render etc files"
  when:
    - dumbproxy_etc_files | length > 0
  ansible.builtin.copy:
    content: "{{ dumbproxy_etc_files[item] }}"
    mode: "{{ dumbproxy_etc_path_files_mode }}"
    owner: "{{ dumbproxy_user }}"
  notify:
    - "restart dumbproxy"

- name: "render dumbproxy service file"
  ansible.builtin.template:
    src: dumbproxy.service.ini.j2
    dest: /etc/systemd/system/dumbproxy.service
    mode: '0644'
  notify:
    - restart dumbproxy
    - enable dumbproxy
